<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تسجيل الدخول - TV Time Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-container">
    <h1>📺 TV Time Clone</h1>
    <div class="auth-eyebrow">سجل كل حلقة شفتها</div>

    <div class="tabs">
      <button id="loginTab" class="tab active">تسجيل الدخول</button>
      <button id="registerTab" class="tab">حساب جديد</button>
    </div>

    <form id="loginForm">
      <input type="text" id="loginUsername" placeholder="اسم المستخدم" required>
      <input type="password" id="loginPassword" placeholder="كلمة السر" required>
      <button type="submit">دخول</button>
    </form>

    <form id="registerForm" class="hidden">
      <input type="text" id="registerUsername" placeholder="اسم المستخدم" required>
      <p class="field-hint">حروف إنجليزية وأرقام و _ بس، من 3 لـ 20 حرف</p>
      <input type="password" id="registerPassword" placeholder="كلمة السر" required>
      <p class="field-hint">6 أحرف على الأقل</p>
      <button type="submit">إنشاء حساب</button>
    </form>

    <p id="message"></p>
  </div>

<script>
  const loginTab = document.getElementById("loginTab");
  const registerTab = document.getElementById("registerTab");
  const loginForm = document.getElementById("loginForm");
  const registerForm = document.getElementById("registerForm");
  const message = document.getElementById("message");

  loginTab.addEventListener("click", () => {
    loginTab.classList.add("active");
    registerTab.classList.remove("active");
    loginForm.classList.remove("hidden");
    registerForm.classList.add("hidden");
  });

  registerTab.addEventListener("click", () => {
    registerTab.classList.add("active");
    loginTab.classList.remove("active");
    registerForm.classList.remove("hidden");
    loginForm.classList.add("hidden");
  });

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("loginUsername").value;
    const password = document.getElementById("loginPassword").value;

    const res = await fetch("/api/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = "/index.html";
    } else {
      message.textContent = data.error;
    }
  });

  registerForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("registerUsername").value;
    const password = document.getElementById("registerPassword").value;

    const res = await fetch("/api/auth/register", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      window.location.href = "/index.html";
    } else {
      message.textContent = data.error;
    }
  });
</script>
</body>
</html>
