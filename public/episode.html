<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تفاصيل الحلقة</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="header-minimal">
    <a id="backToShowLink" href="/index.html" class="back-link">← رجوع للمسلسل</a>
  </header>

  <div id="episodeHero" class="show-hero">
    <img id="episodeStillImg" class="show-hero-img" alt="">
    <div class="show-hero-overlay"></div>
    <div class="show-hero-content">
      <div class="show-hero-info">
        <div id="episodeShowLink"></div>
        <h1 id="episodeTitle">جاري التحميل...</h1>
        <div id="episodeMeta" class="show-hero-meta"></div>
      </div>
    </div>
  </div>

  <main>
    <section id="episodeRatingSection"></section>
    <section id="episodeOverviewSection"></section>
    <section id="episodeCastSection"></section>
    <section id="episodeCrewSection"></section>
    <section id="episodeGallerySection"></section>

    <section class="reviews-section">
      <div class="reviews-header">
        <h2>💬 التعليقات</h2>
      </div>
      <div id="episodeCommentsPanel"></div>
    </section>
  </main>

<script src="ui.js"></script>
<script src="nav.js"></script>
<script src="reviews.js"></script>
<script src="episode.js"></script>
</body>
</html>
