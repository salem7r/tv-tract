<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>مسلسلاتي - TV Time Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>📺 مسلسلاتي</h1>
  </header>

  <main>
    <section>
      <h2>▶️ متابعتي</h2>
      <div class="sub-tabs">
        <button class="sub-tab active" data-view="upnext" onclick="switchUpNextView('upnext', this)">قائمة المشاهدة</button>
        <button class="sub-tab" data-view="upcoming" onclick="switchUpNextView('upcoming', this)">المرتقبة</button>
      </div>
      <div id="upNextList" class="up-next-list"></div>
      <div id="upcomingList" class="up-next-list hidden"></div>
    </section>

    <hr>

    <section>
      <h2>كل مسلسلاتي</h2>
      <div id="myShows" class="grid"></div>
    </section>
  </main>

<script src="ui.js"></script>
<script src="nav.js"></script>
<script src="app.js"></script>
</body>
</html>
